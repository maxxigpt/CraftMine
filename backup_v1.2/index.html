<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minecraft Clone Optimizado</title>
  <link rel="stylesheet" href="style.css">
</head>
<body oncontextmenu="return false;">
  <div id="fps">FPS: 0</div>
  <div id="crosshair">+</div>
  
  <div id="hud">
    <div class="hud-center">
        <div id="hearts-container">
            <div class="heart"></div><div class="heart"></div><div class="heart"></div><div class="heart"></div><div class="heart"></div>
            <div class="heart"></div><div class="heart"></div><div class="heart"></div><div class="heart"></div><div class="heart"></div>
        </div>
        <div class="hotbar">
            <div class="hotbar-slot active" data-id="1"></div>
            <div class="hotbar-slot" data-id="2"></div>
            <div class="hotbar-slot" data-id="3"></div>
            <div class="hotbar-slot" data-id="4"></div>
            <div class="hotbar-slot" data-id="5"></div>
            <div class="hotbar-slot" data-id="6"></div>
            <div class="hotbar-slot" data-id="7"></div>
            <div class="hotbar-slot" data-id="8"></div>
            <div class="hotbar-slot" data-id="9"></div>
        </div>
    </div>
  </div>

  <div id="pause-menu">
      <div id="menu-main">
          <h1 class="logo-title">CraftMine</h1>
          <p class="logo-subtitle">v1.2</p>
          <button class="menu-btn" id="btn-resume">Resume Game</button>
          <button class="menu-btn" id="btn-settings">Settings</button>
          <button class="menu-btn" id="btn-quit">Save & Quit</button>
      </div>

      <div id="menu-settings" class="hidden">
          <h1 class="logo-title" style="margin-bottom: 20px;">Settings</h1>
          
          <div class="setting-row">
              <label>Sensibilidad X: <span id="val-sens-x">1.0</span></label>
              <input type="range" id="sens-x" min="0.1" max="5.0" step="0.1" value="1.0">
          </div>
          
          <div class="setting-row">
              <label>Sensibilidad Y: <span id="val-sens-y">1.0</span></label>
              <input type="range" id="sens-y" min="0.1" max="5.0" step="0.1" value="1.0">
          </div>
          
          <div class="setting-row">
              <label>Modo de Juego:</label>
              <select id="game-mode" class="mc-select">
                  <option value="survival">Survival</option>
                  <option value="creative">Creativo</option>
              </select>
          </div>
          
          <button class="menu-btn" id="btn-back" style="margin-top: 30px;">Back</button>
      </div>
  </div>

  <div id="game-container"></div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="main.js"></script>
</body>
</html>
